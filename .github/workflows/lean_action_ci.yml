name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      # Audit modules live outside the root import spine; the runner discovers them
      # via git ls-files so a new *Audit.lean can never be silently skipped.
      - run: scripts/run-audit-modules.sh
