name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - run: lake env lean ComputableModelTheory/Computability/OraclePredAudit.lean
      - run: lake env lean ComputableModelTheory/Computability/ReductionAudit.lean
      - run: lake env lean ComputableModelTheory/Computability/RecursiveInAudit.lean
      - run: lake env lean ComputableModelTheory/Computability/EncodingAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Syntax/EffectiveLanguageAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Syntax/PrimcodableAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Syntax/ComputableOpsAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Syntax/TermSigmaAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Syntax/FormulaSigmaAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Syntax/FormulaOpsAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Syntax/ComplexityAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Computable/StructureAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Computable/TermEvaluationAudit.lean
