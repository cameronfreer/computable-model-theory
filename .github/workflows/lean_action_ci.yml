name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
      - run: lake env lean ComputableModelTheory/Computability/OraclePredAudit.lean
      - run: lake env lean ComputableModelTheory/Computability/ReductionAudit.lean
      - run: lake env lean ComputableModelTheory/ModelTheory/Syntax/EffectiveLanguageAudit.lean
