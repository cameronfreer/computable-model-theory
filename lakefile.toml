name = "computable-model-theory"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["ComputableModelTheory", "ComputableModelTheoryUtil"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "InfinitaryLogic"
git = "https://github.com/cameronfreer/infinitary-logic"
rev = "6614ec7076f0b4d1911f48cb89a51d5e693fea88"

# Mathlib last so its dependency versions take precedence over transitive ones
# (e.g. batteries / Cli pulled in by LeanArchitect), per Mathlib's lake update guidance.
[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0"

[[lean_lib]]
name = "ComputableModelTheory"

# Test tooling (the axiom-policy assertion command) is kept out of the library's import
# spine; this target ensures its artifacts are still built for the audit modules.
[[lean_lib]]
name = "ComputableModelTheoryUtil"
globs = ["ComputableModelTheory.Util.AssertAxioms"]
